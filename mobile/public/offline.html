<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RideBuddy - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8faff;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        width: min(92vw, 420px);
        background: white;
        border: 1px solid #dbe7ff;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 8px 30px rgba(30, 64, 175, 0.08);
        text-align: center;
      }
      .badge {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        margin: 0 auto 16px;
        display: grid;
        place-items: center;
        background: #1a56db;
        color: #fff;
        font-size: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">🚗</div>
      <h1>RideBuddy</h1>
      <p>You are offline. Please check your internet connection.</p>
    </main>
  </body>
</html>
